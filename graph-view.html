// 建立連結
const edges = [];
nodes.forEach(n => {
  n.links.forEach(lid => {
    if (n.id < lid) {
      edges.push({ source: n.id, target: lid });
    }
  });
});

// 物理模擬
let zoom = 1, panX = canvas.width/2, panY = canvas.height/2;
let isDragging = false, lastMouse = null, dragNode = null;
let showLabels = true;
let animFrame;
let selectedNode = null;

function getNode(id) { return nodes.find(n => n.id === id); }

// 力導向佈局
function applyForces() {
  const k = 0.01, repel = 8000, damp = 0.85;
  nodes.forEach(n => { n.vx = n.vx || 0; n.vy = n.vy || 0; });

  nodes.forEach((a, i) => {
    nodes.forEach((b, j) => {
      if (i >= j) return;
      const dx = b.x - a.x, dy = b.y - a.y;
      const dist = Math.sqrt(dx*dx + dy*dy) || 1;
      const f = repel / (dist * dist);
      a.vx -= f * dx / dist;
      a.vy -= f * dy / dist;
      b.vx += f * dx / dist;
      b.vy += f * dy / dist;
    });
  });

  edges.forEach(e => {
    const a = getNode(e.source), b = getNode(e.target);
    if (!a || !b) return;
    const dx = b.x - a.x, dy = b.y - a.y;
    const dist = Math.sqrt(dx*dx + dy*dy) || 1;
    const ideal = 160;
    const f = (dist - ideal) * k;
    a.vx += f * dx / dist;
    a.vy += f * dy / dist;
    b.vx -= f * dx / dist;
    b.vy -= f * dy / dist;
  });

  nodes.forEach(n => {
    if (n === dragNode) return;
    n.vx *= damp; n.vy *= damp;
    n.x += n.vx; n.y += n.vy;
  });
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.save();
  ctx.translate(panX, panY);
  ctx.scale(zoom, zoom);

  // 畫邊
  edges.forEach(e => {
    const a = getNode(e.source), b = getNode(e.target);
    if (!a || !b) return;
    const isActive = selectedNode && (selectedNode.id === a.id || selectedNode.id === b.id);
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.strokeStyle = isActive ? 'rgba(124,131,253,0.8)' : 'rgba(255,255,255,0.08)';
    ctx.lineWidth = isActive ? 2 : 1;
    ctx.stroke();
  });

  // 畫節點
  nodes.forEach(n => {
    const isSelected = selectedNode && selectedNode.id === n.id;
    const isConnected = selectedNode && selectedNode.links.includes(n.id);

    // 光暈
    if (isSelected) {
      const grad = ctx.createRadialGradient(n.x, n.y, n.r, n.x, n.y, n.r * 2.5);
      grad.addColorStop(0, n.color + '55');
      grad.addColorStop(1, 'transparent');
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r * 2.5, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();
    }

    ctx.beginPath();
    ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
    ctx.fillStyle = isSelected ? n.color : (isConnected ? n.color + 'cc' : n.color + '88');
    ctx.fill();

    if (isSelected || isConnected) {
      ctx.strokeStyle = n.color;
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    if (showLabels) {
      ctx.font = `${Math.max(10, n.r * 0.5)}px Segoe UI`;
      ctx.fillStyle = isSelected ? '#fff' : 'rgba(255,255,255,0.75)';
      ctx.textAlign = 'center';
      ctx.fillText(n.label, n.x, n.y + n.r + 14);
    }
  });

  ctx.restore();
  applyForces();
  animFrame = requestAnimationFrame(draw);
}

// 互動事件
function getMousePos(e) {
  return { x: (e.clientX - panX) / zoom, y: (e.clientY - panY) / zoom };
}
function hitTest(mx, my) {
  return nodes.find(n => Math.hypot(n.x - mx, n.y - my) < n.r + 8);
}

canvas.addEventListener('mousedown', e => {
  const mp = getMousePos(e);
  dragNode = hitTest(mp.x, mp.y);
  mouseDownPos = { x: e.clientX, y: e.clientY };
  if (!dragNode) { isDragging = false; lastMouse = { x: e.clientX, y: e.clientY }; }
});

canvas.addEventListener('mousemove', e => {
  if (dragNode) {
    const mp = getMousePos(e);
    dragNode.x = mp.x; dragNode.y = mp.y;
    dragNode.vx = 0; dragNode.vy = 0;
  } else if (lastMouse) {
    const dx = e.clientX - mouseDownPos.x, dy = e.clientY - mouseDownPos.y;
    if (Math.sqrt(dx*dx + dy*dy) > 4) isDragging = true;
    if (isDragging) {
      panX += e.clientX - lastMouse.x;
      panY += e.clientY - lastMouse.y;
      lastMouse = { x: e.clientX, y: e.clientY };
    }
  }
  const mp = getMousePos(e);
  const hovered = hitTest(mp.x, mp.y);
  const tt = document.getElementById('tooltip');
  if (hovered) {
    tt.style.display = 'block';
    tt.style.left = e.clientX + 12 + 'px';
    tt.style.top = e.clientY - 8 + 'px';
    tt.textContent = hovered.title;
    canvas.style.cursor = 'pointer';
  } else {
    tt.style.display = 'none';
    canvas.style.cursor = isDragging ? 'grabbing' : 'grab';
  }
});

canvas.addEventListener('mouseup', e => {
  if (!isDragging) {
    const mp = getMousePos(e);
    const clicked = hitTest(mp.x, mp.y);
    if (clicked) { selectedNode = clicked; openSidebar(clicked); }
    else { selectedNode = null; closeSidebar(); }
  }
  isDragging = false; dragNode = null; lastMouse = null;
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.9 : 1.1;
  zoom = Math.max(0.3, Math.min(3, zoom * factor));
});

// 計算反向連結（哪些節點連到這個節點）
function getBacklinks(node) {
  return nodes.filter(n => n.links && n.links.includes(node.id));
}

function openSidebar(node) {
  document.getElementById('sb-title').textContent = node.title;
  document.getElementById('sb-tags').innerHTML = node.tags.map(t => `<span class="tag">${t}</span>`).join('');
  document.getElementById('sb-content').textContent = node.content;

  // 正向連結
  document.getElementById('sb-links').innerHTML = node.links.map(lid => {
    const ln = getNode(lid);
    return ln ? `<a onclick="selectNode('${lid}')">→ ${ln.label}</a>` : '';
  }).join('') || '<span style="color:#444;font-size:12px">無</span>';

  // 反向連結
  const bl = getBacklinks(node);
  document.getElementById('sb-backlinks').innerHTML = bl.length
    ? bl.map(n => `<a onclick="selectNode('${n.id}')">← ${n.label}</a>`).join('')
    : '<span style="color:#444;font-size:12px">無</span>';

  // 開啟檔案按鈕
  const btn = document.getElementById('open-file-btn');
  if (node.file) {
    btn.style.display = 'block';
    btn.setAttribute('data-file', node.file);
    // 根據副檔名顯示不同圖示
    const ext = node.file.split('.').pop().toLowerCase();
    const icons = { md: '📝', docx: '📄', pptx: '📊', pdf: '📕' };
    btn.textContent = (icons[ext] || '📄') + ' 開啟 ' + node.file;
  } else {
    btn.style.display = 'none';
  }

  document.getElementById('sidebar').classList.add('open');
}

function openFile() {
  const btn = document.getElementById('open-file-btn');
  const file = btn.getAttribute('data-file');
  if (!file) return;

  const base = window.location.origin + window.location.pathname.replace('graph-view.html', '');
  let url = file.startsWith('../')
    ? window.location.origin + '/knowledge-base/' + file
    : base + file;

  const ext = file.split('.').pop().toLowerCase();

  if (ext === 'md') {
    // md 檔案：fetch 後在側邊渲染
    fetch(url)
      .then(r => r.text())
      .then(text => {
        document.getElementById('md-content').innerHTML = marked.parse(text);
        document.getElementById('md-viewer').classList.add('open');
      })
      .catch(() => alert('無法載入檔案：' + file));
  } else {
    // 其他檔案（pptx, pdf）：直接開新分頁下載
    window.open(url, '_blank');
  }
}

function closeMd() {
  document.getElementById('md-viewer').classList.remove('open');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  selectedNode = null;
}

function selectNode(id) {
  const n = getNode(id);
  if (n) { selectedNode = n; openSidebar(n); }
}

function resetZoom() { zoom = 1; panX = canvas.width/2; panY = canvas.height/2; }
function toggleLabels() { showLabels = !showLabels; }

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  panX = canvas.width/2; panY = canvas.height/2;
});

draw();
</script>
</body>
</html>
