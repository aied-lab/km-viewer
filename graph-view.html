<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KM Viewer — 知識圖譜</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
  :root {
    --bg-main: #1a1a2e; --bg-panel: #16213e; --bg-input: #0d1117; --bg-card: #0d1117;
    --border: #0f3460; --text: #e0e0e0; --text-dim: #888; --text-muted: #555;
    --accent: #3b82f6; --accent2: #0ea5e9; --accent-hover: #2563eb;
    --node-label: rgba(255,255,255,0.55); --edge-default: rgba(255,255,255,0.1);
    --canvas-bg: #1a1a2e;
  }
  [data-theme="light"] {
    --bg-main: #f5f5f7; --bg-panel: #ffffff; --bg-input: #f0f0f3; --bg-card: #f8f8fa;
    --border: #d0d0d8; --text: #1a1a2e; --text-dim: #666; --text-muted: #999;
    --accent: #5b63e0; --accent2: #7c6bc4; --accent-hover: #4a52d0;
    --node-label: rgba(0,0,0,0.6); --edge-default: rgba(0,0,0,0.12);
    --canvas-bg: #f5f5f7;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg-main); color: var(--text); font-family: 'Segoe UI', -apple-system, sans-serif; overflow: hidden; }
  #canvas { width: 100vw; height: 100vh; cursor: grab; }
  #canvas:active { cursor: grabbing; }

  /* ====== 頂部工具列 ====== */
  #toolbar {
    position: fixed; top: 0; left: 0; right: 0; height: 52px;
    background: var(--bg-panel); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 20px; gap: 14px; z-index: 20;
  }
  #toolbar .logo { color: var(--accent); font-weight: bold; font-size: 16px; margin-right: 4px; }
  #toolbar .separator { width: 1px; height: 28px; background: var(--border); }
  #toolbar .info { font-size: 13px; color: var(--text-dim); }
  #toolbar .info span { color: var(--text); font-weight: 500; }
  .dimension-group { display: flex; gap: 4px; margin-left: auto; }
  .layout-group { display: flex; gap: 2px; background: var(--bg-input); border-radius: 8px; padding: 2px; }
  .layout-btn {
    background: transparent; border: none; color: var(--text-dim);
    padding: 6px 8px; border-radius: 6px; cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .layout-btn:hover { color: var(--text); background: var(--border); }
  .layout-btn.active { background: var(--accent); color: #fff; }
  .dim-btn {
    background: transparent; border: 1px solid var(--border); color: var(--text-dim);
    padding: 7px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; transition: all 0.2s;
  }
  .dim-btn:hover { border-color: var(--accent); color: var(--text); }
  .dim-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  #search-box {
    background: var(--bg-input); border: 1px solid var(--border); color: var(--text);
    padding: 7px 14px; border-radius: 6px; font-size: 13px; width: 220px; outline: none;
  }
  #search-box:focus { border-color: var(--accent); }
  #search-box::placeholder { color: var(--text-muted); }

  /* ====== 左側控制面板 ====== */
  #left-panel {
    position: fixed; left: 0; top: 52px; width: 140px; height: calc(100vh - 52px);
    background: var(--bg-panel); border-right: 1px solid var(--border);
    padding: 16px; overflow-y: auto; z-index: 15; font-size: 12px;
  }
  /* 面板拖曳把手 */
  .panel-resize {
    position: absolute; top: 0; bottom: 0; width: 6px; cursor: ew-resize; z-index: 16;
  }
  .panel-resize:hover, .panel-resize.dragging { background: var(--accent); opacity: 0.3; }
  #left-resize { right: -3px; }
  #right-resize { left: -3px; }
  #left-panel h4 { color: var(--accent); margin-bottom: 10px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
  #left-panel .ctrl-group { margin-bottom: 18px; }
  #left-panel .ctrl-label { color: var(--text-dim); font-size: 11px; margin-bottom: 6px; display: flex; justify-content: space-between; }
  #left-panel .slider-wrap { display: flex; flex-direction: column; align-items: center; }
  #left-panel input[type=range] { accent-color: var(--accent); writing-mode: vertical-lr; direction: rtl; height: 80px; width: 20px; }
  .legend-item { display: flex; align-items: center; gap: 8px; padding: 4px 0; cursor: pointer; }
  .legend-item:hover .name { color: var(--text); }
  .legend-item .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .legend-item .name { color: var(--text-dim); font-size: 12px; }
  .legend-item .count { color: var(--text-muted); margin-left: auto; font-size: 11px; }
  .legend-item.dimmed .dot { opacity: 0.25; }
  .legend-item.dimmed .name { color: var(--text-muted); }
  .kw-item {
    padding: 5px 8px; cursor: pointer; font-size: 12px; color: var(--text-dim);
    border-radius: 4px; margin: 1px 0; display: flex; justify-content: space-between; align-items: center;
  }
  .kw-item:hover { background: var(--bg-input); color: var(--text); }
  .kw-item.active { background: var(--accent); color: #fff; }
  .kw-item .kw-count { font-size: 11px; color: var(--text-muted); }

  /* ====== 頂部間距控制條 ====== */
  #spacing-bar {
    position: fixed; top: 52px; left: 180px; right: 0;
    height: 36px; background: var(--bg-panel); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 16px; gap: 10px; z-index: 14;
    font-size: 12px; color: var(--text-dim);
  }
  #spacing-bar input[type=range] { width: 200px; accent-color: var(--accent); }
  #spacing-bar .spacer { flex: 1; }

  /* ====== 右側面板 ====== */
  #sidebar {
    position: fixed; right: 0; top: 52px; width: 380px; height: calc(100vh - 52px);
    background: var(--bg-panel); border-left: 1px solid var(--border);
    padding: 24px; overflow-y: auto;
    transform: translateX(100%); transition: transform 0.3s ease; z-index: 15;
  }
  #sidebar.open { transform: translateX(0); }
  #sidebar .close-btn { position: absolute; top: 14px; right: 14px; cursor: pointer; color: var(--text-dim); font-size: 20px; background: none; border: none; }
  #sidebar .close-btn:hover { color: #fff; }
  #sidebar h2 { color: var(--accent); font-size: 16px; margin-bottom: 8px; padding-right: 28px; word-break: break-all; line-height: 1.4; }
  #sidebar .file-meta { font-size: 13px; color: var(--text-dim); margin-bottom: 12px; line-height: 2; }
  #sidebar .file-meta span { color: var(--text-dim); }
  #sidebar .tag { display: inline-block; background: var(--border); color: var(--accent); padding: 3px 10px; border-radius: 12px; font-size: 12px; margin: 2px; }
  .section-title { font-size: 12px; color: var(--text-muted); margin-top: 16px; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
  #sb-summary { font-size: 14px; color: var(--text); line-height: 1.8; margin-top: 8px; }
  #sb-keywords { margin-top: 8px; }
  #sb-keywords .kw { display: inline-block; background: var(--bg-input); color: var(--text-dim); padding: 3px 10px; border-radius: 4px; font-size: 12px; margin: 2px; border: 1px solid var(--border); }
  #sidebar .child-list a {
    display: block; color: #0ea5e9; font-size: 13px; padding: 4px 0;
    text-decoration: none; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  #sidebar .child-list a:hover { color: #fff; }
  .action-btn {
    margin-top: 12px; width: 100%;
    background: var(--border); border: 1px solid var(--accent); color: var(--accent);
    padding: 10px 0; border-radius: 8px; cursor: pointer; font-size: 14px; transition: all 0.2s;
  }
  .action-btn:hover { background: var(--accent); color: #fff; }

  /* ====== MD 閱讀面板 ====== */
  #md-viewer {
    display: none; position: fixed; top: 52px; left: 0; right: 380px; bottom: 0;
    background: var(--bg-card); overflow-y: auto; padding: 40px 60px; z-index: 12;
  }
  #md-viewer.open { display: block; }
  #md-viewer .close-md {
    position: sticky; top: 0; display: block; width: fit-content; margin: 0 auto 20px;
    cursor: pointer; background: var(--bg-panel); border: 1px solid var(--border); color: var(--accent);
    padding: 8px 24px; border-radius: 20px; font-size: 13px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3); z-index: 13;
  }
  #md-viewer .close-md:hover { background: var(--accent); color: #fff; }
  #md-content {
    max-width: 760px; margin: 0 auto; margin-top: 20px;
    font-size: 15px; line-height: 1.8; color: var(--text);
  }
  #md-content h1 { color: var(--accent); font-size: 24px; margin-bottom: 16px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
  #md-content h2 { color: #0ea5e9; font-size: 18px; margin-top: 24px; margin-bottom: 10px; }
  #md-content h3 { color: #60a5fa; font-size: 15px; margin-top: 16px; }
  #md-content table { width: 100%; border-collapse: collapse; margin: 12px 0; }
  #md-content th { background: var(--border); color: var(--accent); padding: 8px 12px; text-align: left; font-size: 13px; }
  #md-content td { padding: 7px 12px; border-bottom: 1px solid #1a2744; font-size: 14px; }
  #md-content tr:hover td { background: #111827; }
  #md-content code { background: #1e2a3a; padding: 2px 6px; border-radius: 4px; font-size: 13px; color: #34d399; }
  #md-content pre { background: #1e2a3a; padding: 14px; border-radius: 6px; overflow-x: auto; margin: 12px 0; }
  #md-content pre code { padding: 0; }
  #md-content blockquote { border-left: 3px solid #3b82f6; padding-left: 16px; color: var(--text-dim); margin: 12px 0; }
  #md-content strong { color: #f0f0f0; }
  #md-content a { color: var(--accent); text-decoration: none; }
  #md-content hr { border: none; border-top: 1px solid #1a2744; margin: 20px 0; }
  #md-content ul, #md-content ol { padding-left: 24px; margin: 8px 0; }
  #md-content li { margin: 4px 0; }

  /* ====== 查詢面板（可停靠底部/右側，可調整大小） ====== */
  #chat-panel {
    position: fixed; display: none; flex-direction: column;
    background: var(--bg-panel); border-top: 1px solid var(--border); z-index: 25;
    /* 預設：底部停靠 */
    left: 0; right: 0; bottom: 0; height: 320px;
  }
  #chat-panel.open { display: flex; }
  #chat-panel.dock-right {
    top: 52px; left: auto; right: 0; bottom: 0;
    width: 480px; height: auto;
    border-top: none; border-left: 1px solid var(--border);
  }
  /* 拖曳調整大小的把手 */
  #chat-resize {
    position: absolute; background: transparent; z-index: 26;
  }
  #chat-panel:not(.dock-right) #chat-resize {
    top: -4px; left: 0; right: 0; height: 8px; cursor: ns-resize;
  }
  #chat-panel.dock-right #chat-resize {
    top: 0; bottom: 0; left: -4px; width: 8px; cursor: ew-resize;
  }
  #chat-resize:hover, #chat-resize.dragging { background: #3b82f644; }
  #chat-header {
    padding: 10px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px; flex-shrink: 0;
    font-size: 14px; color: var(--accent); font-weight: bold;
  }
  #chat-header .chat-title { flex-shrink: 0; }
  #chat-header .chat-controls { display: flex; gap: 6px; margin-left: auto; align-items: center; }
  #chat-header select {
    background: var(--bg-card); border: 1px solid var(--border); color: var(--text-dim);
    padding: 4px 8px; border-radius: 4px; font-size: 12px; outline: none; cursor: pointer;
  }
  #chat-header select:focus { border-color: var(--accent); }
  .chat-ctrl-btn {
    background: none; border: 1px solid transparent; color: var(--text-muted); cursor: pointer;
    font-size: 15px; padding: 2px 6px; border-radius: 4px;
  }
  .chat-ctrl-btn:hover { color: var(--text); border-color: var(--border); }
  .chat-ctrl-btn.active { color: var(--accent); }
  #chat-messages {
    flex: 1; overflow-y: auto; padding: 16px 20px;
    font-size: 14px; line-height: 1.8; color: var(--text);
  }
  #chat-messages .msg-user { color: var(--accent); margin-bottom: 8px; font-weight: 500; }
  #chat-messages .msg-user::before { content: '🙋 '; }
  #chat-messages .msg-bot {
    color: var(--text); margin-bottom: 16px; padding: 14px 18px;
    background: var(--bg-input); border: 1px solid var(--border); border-radius: 10px; font-size: 14px; line-height: 1.8;
  }
  #chat-messages .msg-bot p { margin: 6px 0; }
  #chat-messages .msg-bot ul, #chat-messages .msg-bot ol { padding-left: 22px; margin: 6px 0; }
  #chat-messages .msg-bot li { margin: 3px 0; }
  #chat-messages .msg-bot strong { color: var(--text); font-weight: 700; }
  #chat-messages .msg-bot a { color: var(--accent); cursor: pointer; text-decoration: underline; }
  #chat-messages .msg-bot code { background: var(--border); padding: 2px 6px; border-radius: 4px; font-size: 13px; color: var(--accent); }
  #chat-messages .msg-loading { color: var(--text-dim); padding: 10px 0; display: flex; align-items: center; gap: 10px; font-size: 13px; }
  #chat-messages .msg-loading .dot-pulse { display: inline-flex; gap: 4px; }
  #chat-messages .msg-loading .dot-pulse span {
    width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
    animation: dotPulse 1.2s infinite ease-in-out;
  }
  #chat-messages .msg-loading .dot-pulse span:nth-child(2) { animation-delay: 0.2s; }
  #chat-messages .msg-loading .dot-pulse span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotPulse { 0%,80%,100% { opacity: 0.2; transform: scale(0.8); } 40% { opacity: 1; transform: scale(1.2); } }
  #chat-messages .msg-model { font-size: 11px; color: #444; margin-top: -12px; margin-bottom: 12px; }
  #chat-input-area {
    padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; flex-shrink: 0;
  }
  #chat-input {
    flex: 1; background: var(--bg-card); border: 1px solid var(--border); color: var(--text);
    padding: 10px 14px; border-radius: 8px; font-size: 14px; outline: none;
  }
  #chat-input:focus { border-color: var(--accent); }
  #chat-send-btn {
    background: var(--accent); border: none; color: #fff; padding: 10px 20px;
    border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500;
  }
  #chat-send-btn:hover { background: #2563eb; }
  #chat-send-btn:disabled { background: #333; color: var(--text-dim); cursor: not-allowed; }

  /* ====== 設定面板（選擇目錄） ====== */
  #settings-panel {
    position: fixed; top: 52px; left: 0; right: 0; bottom: 0;
    background: var(--bg-main); display: none; align-items: center; justify-content: center;
    z-index: 50; backdrop-filter: blur(4px);
  }
  #settings-panel.open { display: flex; }
  .settings-card {
    background: var(--bg-panel); border: 1px solid var(--border); border-radius: 14px;
    padding: 32px 40px; width: 500px; max-width: 90vw;
  }
  .settings-card h2 { color: var(--accent); font-size: 18px; margin-bottom: 20px; }
  .settings-card .field { margin-bottom: 16px; }
  .settings-card label { font-size: 13px; color: var(--text-dim); display: block; margin-bottom: 6px; }
  .settings-card input[type=text] {
    width: 100%; background: var(--bg-card); border: 1px solid var(--border); color: var(--text);
    padding: 10px 14px; border-radius: 8px; font-size: 14px; outline: none;
  }
  .settings-card input[type=text]:focus { border-color: var(--accent); }
  .settings-card .btn-row { display: flex; gap: 10px; margin-top: 20px; }
  .settings-card .btn-primary {
    flex: 1; background: var(--accent); border: none; color: #fff;
    padding: 12px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500;
  }
  .settings-card .btn-primary:hover { background: #2563eb; }
  .settings-card .btn-secondary {
    flex: 1; background: transparent; border: 1px solid var(--border); color: var(--text-dim);
    padding: 12px; border-radius: 8px; cursor: pointer; font-size: 14px;
  }
  .settings-card .btn-secondary:hover { border-color: var(--accent); color: var(--text); }
  .settings-card .dir-list { margin-top: 12px; }
  .browser-item {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px; cursor: pointer; font-size: 13px; color: var(--text);
    border-bottom: 1px solid var(--border); transition: background 0.1s;
  }
  .browser-item:last-child { border-bottom: none; }
  .browser-item:hover { background: var(--bg-input); }
  .browser-item.selected { background: var(--accent); color: #fff; }
  .browser-item .icon { font-size: 16px; flex-shrink: 0; }
  .browser-item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .browser-item .meta { font-size: 11px; color: var(--text-muted); flex-shrink: 0; }
  .browser-up { color: var(--accent); font-weight: 500; }
  .settings-card .dir-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; margin: 6px 0; background: var(--bg-card); border-radius: 8px;
    cursor: pointer; transition: all 0.2s; border: 1px solid transparent;
  }
  .settings-card .dir-item:hover { border-color: var(--accent); }
  .settings-card .dir-item.active { border-color: var(--accent); background: var(--border); }
  .settings-card .dir-item .dir-name { color: var(--text); font-size: 14px; }
  .settings-card .dir-item .dir-meta { color: var(--text-muted); font-size: 12px; }

  /* ====== Tooltip ====== */
  .tooltip {
    position: fixed; background: var(--bg-panel); border: 1px solid var(--border);
    padding: 8px 12px; border-radius: 8px; font-size: 13px; color: var(--text);
    pointer-events: none; z-index: 30; display: none; max-width: 360px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    backdrop-filter: blur(4px);
  }

  /* ====== 控制按鈕 ====== */
  #controls {
    position: fixed; right: 16px; bottom: 16px;
    display: flex; gap: 6px; z-index: 15;
  }
  #controls button {
    background: var(--bg-panel); border: 1px solid var(--border); color: var(--accent);
    padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 13px;
    transition: all 0.2s; backdrop-filter: blur(4px);
  }
  #controls button:hover { background: var(--accent); color: #fff; }

  /* ====== 載入 ====== */
  #loading {
    position: fixed; inset: 0; background: var(--bg-main);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 16px; z-index: 100;
  }
  #loading .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  #loading .msg { color: var(--text-dim); font-size: 14px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading.hidden { display: none; }

  /* ====== 時間軸 ====== */
  #timeline-bar {
    position: fixed; bottom: 60px; left: 200px; right: 200px;
    background: var(--bg-panel); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 24px; z-index: 15; display: none; backdrop-filter: blur(4px);
  }
  #timeline-bar.visible { display: block; }
  #timeline-bar label { font-size: 12px; color: var(--text-dim); }
  #timeline-bar .range-labels { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  #timeline-range { width: 100%; accent-color: var(--accent); }

  /* ====== 手機適配 ====== */
  @media (max-width: 768px) {
    #left-panel { display: none; }
    #spacing-bar { left: 0; }
    #toolbar { gap: 6px; padding: 0 8px; overflow-x: auto; }
    #toolbar .logo { font-size: 13px; }
    #toolbar .info { display: none; }
    #toolbar .separator { display: none; }
    #search-box { width: 120px; font-size: 12px; }
    .dim-btn { padding: 5px 8px; font-size: 11px; }
    #sidebar { width: 100vw; }
    #sidebar.open { width: 100vw; }
    #chat-panel { width: 100vw !important; left: 0; right: 0; }
    #chat-panel.dock-right { width: 100vw !important; top: 52px; }
    #chat-header select { font-size: 14px; min-width: 140px; padding: 6px 10px; }
    #chat-input { font-size: 16px; }
    #controls { bottom: 8px; right: 8px; }
    #controls button { padding: 6px 10px; font-size: 11px; }
  }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div class="msg">載入知識圖譜資料...</div>
</div>

<div id="toolbar">
  <span class="logo">KM Viewer</span>
  <div class="separator"></div>
  <span class="info" id="info-text">載入中...</span>
  <input type="text" id="search-box" placeholder="搜尋檔案名稱...">
  <div class="separator"></div>
  <div class="dimension-group">
    <button class="dim-btn active" data-dim="category" onclick="switchDimension('category')">檔案類型</button>
    <button class="dim-btn" data-dim="folder" onclick="switchDimension('folder')">資料夾</button>
    <button class="dim-btn" data-dim="timeline" onclick="switchDimension('timeline')">時間軸</button>
    <button class="dim-btn" data-dim="keyword" onclick="switchDimension('keyword')">關鍵字</button>
  </div>
  <div class="separator"></div>
  <div class="layout-group">
    <button class="layout-btn active" data-layout="graph" onclick="switchLayout('graph')" title="關聯圖">

<script>
// ====== 全域狀態 ======
let graphData = null;
let visibleNodes = [];
let visibleEdges = [];
let currentDimension = 'category';
let showLabels = true;
let selectedNode = null;
let searchTerm = '';
let highlightedCategories = new Set();
let timelineFilter = null;
let hoveredNode = null;
let hideNoContent = true; // 預設隱藏無摘要的圖片等節點
let spacingFactor = 1.0; // 節點間距倍率（拉桿控制）

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let zoom = 1, panX = 0, panY = 0;
let isDragging = false, lastMouse = null, dragNode = null, mouseDownPos = null;
let simNodes = [];

// ====== 顏色 ======
const CATEGORY_COLORS = {
  '資料夾': '#3b82f6', '關鍵字': '#f59e0b', '文件': '#0ea5e9', '簡報': '#f43f5e',
  '試算表': '#10b981', '圖片': '#eab308', '影音': '#f97316',
  '程式碼': '#06b6d4', '壓縮檔': '#64748b', '其他': '#6b7280',
  '網頁': '#0ea5e9', '文字': '#8b5cf6',
};
const DEPTH_COLORS = ['#3b82f6','#0ea5e9','#06b6d4','#10b981','#eab308','#f43f5e','#f97316','#8b5cf6','#64748b'];
const TIMELINE_COLORS = ['#1e3a5f','#1e4d7a','#1e6091','#2084c7','#38bdf8','#60ccfa','#7dd3fc','#a5e0fb','#c9edfc','#e0f5fe'];

// ====== 載入 ======
async function loadData() {
  try {
    const resp = await fetch('graph-data.json?t=' + Date.now());
    if (!resp.ok) throw new Error('找不到 graph-data.json\n請先執行：python3 km-scan.py /你的目錄');
    graphData = await resp.json();
    init();
  } catch (e) {
    document.querySelector('#loading .msg').textContent = '❌ ' + e.message;
    document.querySelector('#loading .spinner').style.display = 'none';
  }
}

function init() {
  document.getElementById('loading').classList.add('hidden');
  const meta = graphData.meta;
  document.getElementById('info-text').innerHTML =
    `<span>${meta.rootName}</span> — ${meta.totalFiles} 個檔案 · ${meta.totalFolders} 個資料夾`;
  const dirEl = document.getElementById('current-dir');
  if (dirEl) dirEl.textContent = meta.rootDir || meta.rootName;
  resizeCanvas();
  buildVisualization();
  draw();
}

// ====== 維度切換 ======
let currentLayout = 'graph'; // graph | mindmap | tree

function switchDimension(dim) {
  currentDimension = dim;
  document.querySelectorAll('.dim-btn[data-dim]').forEach(b => b.classList.toggle('active', b.dataset.dim === dim));
  const tbar = document.getElementById('timeline-bar');
  if (dim === 'timeline') { tbar.classList.add('visible'); setupTimeline(); }
  else { tbar.classList.remove('visible'); timelineFilter = null; }
  // 關鍵字面板
  const kwPanel = document.getElementById('keyword-panel');
  if (dim === 'keyword') { kwPanel.style.display = 'block'; buildKeywordList(); }
  else { kwPanel.style.display = 'none'; }
  highlightedCategories.clear();
  buildVisualization();
}

function switchLayout(layout) {
  currentLayout = layout;
  document.querySelectorAll('.layout-btn').forEach(b => b.classList.toggle('active', b.dataset.layout === layout));
  buildVisualization();
}

function setupTimeline() {
  if (!graphData || !graphData.meta.dateRange) return;
  const r = graphData.meta.dateRange;
  document.getElementById('timeline-min').textContent = r.min.slice(0,10);
  document.getElementById('timeline-max').textContent = r.max.slice(0,10);
  document.getElementById('timeline-label').textContent = '全部';
  document.getElementById('timeline-range').value = 100;
}

document.getElementById('timeline-range').addEventListener('input', function() {
  if (!graphData || !graphData.meta.dateRange) return;
  const val = parseInt(this.value), r = graphData.meta.dateRange;
  const minT = new Date(r.min).getTime(), maxT = new Date(r.max).getTime();
  const cutoff = new Date(minT + (maxT - minT) * val / 100);
  timelineFilter = cutoff.toISOString();
  document.getElementById('timeline-label').textContent = val === 100 ? '全部' : cutoff.toISOString().slice(0,10);
  buildVisualization();
});

// ====== 建立視覺化 ======
function buildVisualization() {
  if (!graphData) return;
  let nodes = graphData.nodes, edges = graphData.edges;

  // 隱藏無內容的節點
  const hasWiki = graphData.meta.hasWiki;
  if (hideNoContent) {
    if (hasWiki) {
      // Wiki 模式：只保留有摘要的檔案，排除資料夾和無內容檔案
      const keepIds = new Set();
      nodes.forEach(n => {
        if (n.type !== 'folder' && n.summary && !n.summary.startsWith('（') && !n.summary.endsWith('檔案。')) {
          keepIds.add(n.id);
        }
      });
      if (keepIds.size > 0) {
        nodes = nodes.filter(n => keepIds.has(n.id));
        edges = edges.filter(e => keepIds.has(e.source) && keepIds.has(e.target));
      }
    }
    // 非 wiki 模式：不過濾，顯示全部
  }

  if (timelineFilter) {
    const ids = new Set();
    nodes = nodes.filter(n => { if (n.type==='folder'){ids.add(n.id);return true;} if(n.modified&&n.modified<=timelineFilter){ids.add(n.id);return true;} return false; });
    edges = edges.filter(e => ids.has(e.source) && ids.has(e.target));
  }
  if (searchTerm) {
    const term = searchTerm.toLowerCase(), matchIds = new Set();
    nodes.forEach(n => { if (n.label.toLowerCase().includes(term)) matchIds.add(n.id); });
    nodes.forEach(n => { if (matchIds.has(n.id) && n.parent) matchIds.add(n.parent); });
    nodes = nodes.filter(n => matchIds.has(n.id));
    edges = edges.filter(e => matchIds.has(e.source) && matchIds.has(e.target));
  }
  if (highlightedCategories.size > 0) {
    const ids = new Set();
    nodes.forEach(n => { if (highlightedCategories.has(getNodeGroup(n)) || n.type==='folder') ids.add(n.id); });
    nodes = nodes.filter(n => ids.has(n.id));
    edges = edges.filter(e => ids.has(e.source) && ids.has(e.target));
  }

  // 關鍵字維度：為每個關鍵字建立節點，連結到擁有該關鍵字的檔案
  if (currentDimension === 'keyword') {
    const kwMap = {}; // keyword → [node_ids]
    nodes.forEach(n => {
      if (n.keywords && n.keywords.length > 0) {
        n.keywords.forEach(kw => {
          if (!kwMap[kw]) kwMap[kw] = [];
          kwMap[kw].push(n.id);
        });
      }
    });
    // 只保留連結 >= 2 個檔案的關鍵字
    const kwNodes = [];
    const kwEdges = [];
    Object.entries(kwMap).forEach(([kw, fileIds]) => {
      if (fileIds.length < 2) return;
      const kwId = 'kw_' + kw;
      kwNodes.push({
        id: kwId, label: kw, type: 'keyword', category: '關鍵字',
        r: Math.max(10, Math.min(20, 8 + fileIds.length * 2)),
        displayColor: '#f59e0b',
      });
      fileIds.forEach(fid => {
        kwEdges.push({ source: kwId, target: fid, type: 'keyword' });
      });
    });
    nodes = [...nodes, ...kwNodes];
    edges = kwEdges;

    // 如果有選中特定關鍵字，只顯示該關鍵字和連結的檔案
    if (activeKeywordFilter) {
      const kwId = 'kw_' + activeKeywordFilter;
      const connectedIds = new Set([kwId]);
      edges.forEach(e => {
        if (e.source === kwId) connectedIds.add(e.target);
        if (e.target === kwId) connectedIds.add(e.source);
      });
      nodes = nodes.filter(n => connectedIds.has(n.id));
      edges = edges.filter(e => connectedIds.has(e.source) && connectedIds.has(e.target));
    }
  }

  visibleEdges = edges;
  visibleNodes = nodes;

  const oldPos = {};
  simNodes.forEach(sn => { oldPos[sn.id] = {x:sn.x,y:sn.y}; });

  if (currentLayout === 'mindmap') {
    simNodes = layoutMindMap(visibleNodes, visibleEdges, oldPos);
  } else if (currentLayout === 'tree') {
    simNodes = layoutTree(visibleNodes, visibleEdges, oldPos);
  } else {
    const cols = Math.ceil(Math.sqrt(visibleNodes.length));
    simNodes = visibleNodes.map((n, i) => {
      const old = oldPos[n.id];
      const angle = (i / visibleNodes.length) * Math.PI * 2;
      const radius = 80 + visibleNodes.length * 8;
      const defaultX = Math.cos(angle) * radius;
      const defaultY = Math.sin(angle) * radius;
      return { ...n,
        x: old ? old.x : defaultX,
        y: old ? old.y : defaultY,
        vx: 0, vy: 0,
        r: n.r || getNodeRadius(n),
        displayColor: n.displayColor || getNodeColor(n)
      };
    });
  }
  buildLegend();
}

// ====== 結構佈局的智慧分群 ======
function getLayoutGroups(nodes) {
  const fileNodes = nodes.filter(n => n.type !== 'folder');
  // 嘗試用關鍵字分群（取每個節點的第一個關鍵字）
  const kwGroups = {};
  fileNodes.forEach(n => {
    const kw = (n.keywords && n.keywords.length > 0) ? n.keywords[0] : null;
    if (kw) { if (!kwGroups[kw]) kwGroups[kw] = []; kwGroups[kw].push(n); }
  });
  // 如果關鍵字分群產生 3 組以上，就用關鍵字
  const kwNames = Object.keys(kwGroups);
  if (kwNames.length >= 3) {
    // 把沒有關鍵字的節點分到「其他」
    const grouped = new Set();
    kwNames.forEach(k => kwGroups[k].forEach(n => grouped.add(n.id)));
    const ungrouped = fileNodes.filter(n => !grouped.has(n.id));
    if (ungrouped.length > 0) kwGroups['其他'] = ungrouped;
    return kwGroups;
  }
  // 否則用 tags 分群
  const tagGroups = {};
  fileNodes.forEach(n => {
    const tag = (n.tags && n.tags.length > 0) ? n.tags[0].replace(/^#/, '') : null;
    if (tag) { if (!tagGroups[tag]) tagGroups[tag] = []; tagGroups[tag].push(n); }
  });
  if (Object.keys(tagGroups).length >= 3) {
    const grouped = new Set();
    Object.values(tagGroups).forEach(arr => arr.forEach(n => grouped.add(n.id)));
    const ungrouped = fileNodes.filter(n => !grouped.has(n.id));
    if (ungrouped.length > 0) tagGroups['其他'] = ungrouped;
    return tagGroups;
  }
  // 否則用維度的 getNodeGroup
  const groups = {};
  fileNodes.forEach(n => {
    const g = getNodeGroup(n);
    if (!groups[g]) groups[g] = [];
    groups[g].push(n);
  });
  return groups;
}

// ====== 心智圖佈局 ======
function layoutMindMap(nodes, edges, oldPos) {
  const groups = getLayoutGroups(nodes);

  const groupNames = Object.keys(groups);
  const totalGroups = groupNames.length;
  const result = [];

  // 群組交替分配到左右兩側
  // 右側群組角度在 -60° ~ +60°，左側在 120° ~ 240°
  const rightCount = Math.ceil(totalGroups / 2);
  const leftCount = totalGroups - rightCount;

  groupNames.forEach((gName, gi) => {
    const members = groups[gName];
    const isRight = gi % 2 === 0;
    const sideIndex = Math.floor(gi / 2);
    const sideCount = isRight ? rightCount : leftCount;

    // 計算這個群組的基準角度
    let baseAngle;
    if (isRight) {
      // 右側：從 -50° 到 +50°
      baseAngle = sideCount > 1 ? (-50 + sideIndex * (100 / (sideCount - 1))) * Math.PI / 180 : 0;
    } else {
      // 左側：從 130° 到 230°
      baseAngle = sideCount > 1 ? (130 + sideIndex * (100 / (sideCount - 1))) * Math.PI / 180 : Math.PI;
    }

    // 群組中心距離根節點
    const groupDist = 200;
    const gx = Math.cos(baseAngle) * groupDist;
    const gy = Math.sin(baseAngle) * groupDist;

    // 節點從群組中心向外扇形展開
    const fanAngle = Math.min(Math.PI * 0.5, 0.15 + members.length * 0.08);
    const nodeStartDist = 60;
    const nodeGap = 45;

    members.forEach((n, mi) => {
      // 扇形排列：每個節點有不同角度和距離
      const t = members.length > 1 ? (mi / (members.length - 1) - 0.5) : 0;
      const nodeAngle = baseAngle + t * fanAngle;
      const nodeDist = groupDist + nodeStartDist + mi * 18;

      result.push({ ...n,
        x: Math.cos(nodeAngle) * nodeDist,
        y: Math.sin(nodeAngle) * nodeDist,
        vx: 0, vy: 0,
        r: n.r || getNodeRadius(n),
        displayColor: n.displayColor || getNodeColor(n),
        _mmGroup: gName,
        _mmAngle: baseAngle,
        _mmGx: gx,
        _mmGy: gy,
      });
    });
  });

  return result;
}

// ====== 樹狀圖佈局 ======
function layoutTree(nodes, edges, oldPos) {
  const groups = getLayoutGroups(nodes);

  const groupNames = Object.keys(groups);
  const result = [];
  const nodeGap = 38;
  const groupGap = 50;
  const levelX = 220; // 子節點 x 偏移

  let cursorY = 0;

  groupNames.forEach((gName, gi) => {
    const members = groups[gName];
    const groupStartY = cursorY;

    members.forEach((n, mi) => {
      result.push({ ...n,
        x: levelX,
        y: cursorY,
        vx: 0, vy: 0,
        r: n.r || getNodeRadius(n),
        displayColor: n.displayColor || getNodeColor(n),
        _treeGroup: gName,
        _treeGroupY: 0, // 稍後補上群組中心 Y
      });
      cursorY += nodeGap;
    });

    // 記錄群組中心 Y 給連線用
    const groupMidY = (groupStartY + cursorY - nodeGap) / 2;
    result.forEach(n => { if (n._treeGroup === gName && n._treeGroupY === 0) n._treeGroupY = groupMidY; });

    cursorY += groupGap;
  });

  // 居中
  const centerY = cursorY / 2;
  result.forEach(n => { n.y -= centerY; });

  return result;
}

function getNodeGroup(n) {
  if (currentDimension==='category') return n.category;
  if (currentDimension==='folder') { if(n.type==='folder') return n.label; const p=graphData.nodes.find(x=>x.id===n.parent); return p?p.label:'根目錄'; }
  if (currentDimension==='timeline') return n.modifiedMonth||'未知';
  if (currentDimension==='keyword') return n.type==='keyword'?'關鍵字':n.category;
  return n.category;
}

function getNodeColor(n) {
  if (currentDimension==='category') return CATEGORY_COLORS[n.category]||'#6b7280';
  if (currentDimension==='folder') return DEPTH_COLORS[(n.depth||0)%DEPTH_COLORS.length];
  if (currentDimension==='timeline') {
    if (!n.modified||!graphData.meta.dateRange) return '#6b7280';
    const r=graphData.meta.dateRange, minT=new Date(r.min).getTime(), maxT=new Date(r.max).getTime();
    const ratio = maxT>minT?(new Date(n.modified).getTime()-minT)/(maxT-minT):0.5;
    return TIMELINE_COLORS[Math.min(Math.floor(ratio*TIMELINE_COLORS.length),TIMELINE_COLORS.length-1)];
  }
  return '#6b7280';
}

function getNodeRadius(n) {
  if (n.type==='folder') return Math.max(18, Math.min(36, 14+(n.children?n.children.length:0)*1.5));
  // 有摘要的文件節點更大
  if (n.summary && !n.summary.startsWith('（')) {
    const sizeMap = {'文件':14,'簡報':15,'試算表':13,'程式碼':10,'圖片':6,'影音':7,'壓縮檔':6,'其他':6};
    return sizeMap[n.category]||10;
  }
  const sizeMap = {'文件':10,'簡報':11,'試算表':10,'程式碼':8,'圖片':5,'影音':6,'壓縮檔':5,'其他':5};
  return sizeMap[n.category]||7;
}

// ====== 圖例 ======
function buildLegend() {
  const groups = {};
  simNodes.forEach(n => { const g=getNodeGroup(n); groups[g]=(groups[g]||0)+1; });
  let title = currentDimension==='folder'?'資料夾':currentDimension==='timeline'?'時間':currentDimension==='keyword'?'關鍵字':'檔案類型';
  if (currentLayout !== 'graph') title = (currentLayout==='mindmap'?'心智圖':'樹狀圖') + ' · ' + title;
  let html = `<h4>${title}</h4>`;
  const sorted = Object.entries(groups).sort((a,b)=>b[1]-a[1]).slice(0,12);
  sorted.forEach(([name,count]) => {
    const color = currentDimension==='category'?(CATEGORY_COLORS[name]||'#6b7280'):simNodes.find(n=>getNodeGroup(n)===name)?.displayColor||'#6b7280';
    const dimmed = highlightedCategories.size>0&&!highlightedCategories.has(name)?' dimmed':'';
    html += `<div class="legend-item${dimmed}" onclick="toggleCategory('${name.replace(/'/g,"\\'")}')">
      <span class="dot" style="background:${color}"></span><span class="name">${name}</span><span class="count">${count}</span></div>`;
  });
  document.getElementById('legend').innerHTML = html;
}

function toggleCategory(name) {
  if (highlightedCategories.has(name)) highlightedCategories.delete(name); else highlightedCategories.add(name);
  buildVisualization();
}

// ====== 搜尋 ======
document.getElementById('search-box').addEventListener('input', function() { searchTerm=this.value.trim(); buildVisualization(); });

// ====== 物理 ======
function drawStructuredEdges(ctx, tc) {
  const groups = {};
  simNodes.forEach(n => {
    const g = getNodeGroup(n);
    if (!groups[g]) groups[g] = [];
    groups[g].push(n);
  });

  if (currentLayout === 'mindmap') {
    const rootName = graphData.meta.rootName || 'Root';

    // 畫各分支
    Object.entries(groups).forEach(([gName, members]) => {
      if (!members.length) return;
      const color = members[0].displayColor || '#6b7280';
      const gx = members[0]._mmGx || 0;
      const gy = members[0]._mmGy || 0;
      const angle = members[0]._mmAngle || 0;
      const isLeft = Math.abs(angle) > Math.PI / 2;

      // 根 → 群組中心（粗曲線）
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.quadraticCurveTo(gx * 0.4, gy * 0.2, gx, gy);
      ctx.strokeStyle = color + 'aa';
      ctx.lineWidth = Math.min(5, 2 + members.length * 0.2);
      ctx.lineCap = 'round';
      ctx.stroke();

      // 群組中心 → 各節點
      members.forEach((n, i) => {
        ctx.beginPath();
        ctx.moveTo(gx, gy);
        const cpx = (gx + n.x) / 2;
        const cpy = (gy + n.y) / 2 + (n.x - gx) * 0.08;
        ctx.quadraticCurveTo(cpx, cpy, n.x, n.y);
        ctx.strokeStyle = color + '55';
        ctx.lineWidth = Math.max(1, 2 - i * 0.08);
        ctx.lineCap = 'round';
        ctx.stroke();
      });

      // 群組標籤
      ctx.font = 'bold 13px Segoe UI,sans-serif';
      ctx.fillStyle = color + 'dd';
      ctx.textAlign = isLeft ? 'right' : 'left';
      ctx.fillText(gName, gx + (isLeft ? -12 : 12), gy - 14);
    });

    // 中心根圓
    ctx.beginPath();
    ctx.arc(0, 0, 30, 0, Math.PI * 2);
    const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, 30);
    grad.addColorStop(0, '#38bdf8');
    grad.addColorStop(1, '#3b82f6');
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.strokeStyle = '#ffffff44';
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.font = 'bold 11px Segoe UI,sans-serif';
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const dispName = rootName.length > 10 ? rootName.slice(0, 9) + '..' : rootName;
    ctx.fillText(dispName, 0, 0);
    ctx.textBaseline = 'alphabetic';

  } else if (currentLayout === 'tree') {
    const rootX = -40;

    // 收集群組 Y 範圍
    const groupInfo = {};
    simNodes.forEach(n => {
      const g = getNodeGroup(n);
      if (!groupInfo[g]) groupInfo[g] = { minY: Infinity, maxY: -Infinity, nodes: [], color: n.displayColor || '#6b7280' };
      groupInfo[g].minY = Math.min(groupInfo[g].minY, n.y);
      groupInfo[g].maxY = Math.max(groupInfo[g].maxY, n.y);
      groupInfo[g].nodes.push(n);
    });

    const allGroups = Object.entries(groupInfo);

    // 主幹線（從最上到最下群組中心）
    if (allGroups.length > 1) {
      const firstMid = (allGroups[0][1].minY + allGroups[0][1].maxY) / 2;
      const lastMid = (allGroups[allGroups.length-1][1].minY + allGroups[allGroups.length-1][1].maxY) / 2;
      ctx.beginPath();
      ctx.moveTo(rootX, firstMid);
      ctx.lineTo(rootX, lastMid);
      ctx.strokeStyle = tc.text + '22';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    allGroups.forEach(([gName, info]) => {
      const color = info.color;
      const midY = (info.minY + info.maxY) / 2;

      // 群組圓點（在主幹上）
      ctx.beginPath();
      ctx.arc(rootX, midY, 6, 0, Math.PI * 2);
      ctx.fillStyle = color + 'cc';
      ctx.fill();

      // 群組標籤
      ctx.font = 'bold 12px Segoe UI,sans-serif';
      ctx.fillStyle = color + 'dd';
      ctx.textAlign = 'right';
      ctx.fillText(gName, rootX - 14, midY + 4);

      // 群組垂直括弧線
      if (info.nodes.length > 1) {
        ctx.beginPath();
        ctx.moveTo(rootX + 20, info.minY);
        ctx.lineTo(rootX + 20, info.maxY);
        ctx.strokeStyle = color + '44';
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        ctx.stroke();
      }

      // 水平線到各節點
      info.nodes.forEach(n => {
        ctx.beginPath();
        ctx.moveTo(rootX + 20, n.y);
        ctx.bezierCurveTo(rootX + 80, n.y, n.x - 60, n.y, n.x - n.r - 4, n.y);
        ctx.strokeStyle = color + '33';
        ctx.lineWidth = 1.2;
        ctx.lineCap = 'round';
        ctx.stroke();
      });
    });
  }
}

function applyForces() {
  const count = simNodes.length;
  if (count === 0) return;
  // 心智圖/樹狀圖：固定佈局，不套用物理力
  if (currentLayout === 'mindmap' || currentLayout === 'tree') return;

  // 根據節點數量和間距拉桿動態調整
  const sf = spacingFactor;
  const k = 0.005;
  const repel = Math.max(800, 5000 / Math.sqrt(count)) * sf * sf;
  const gravity = (0.01 + count * 0.0005) / sf;
  const damp = 0.75;
  const maxSpeed = 15;

  simNodes.forEach(n => {
    n.vx = n.vx || 0; n.vy = n.vy || 0;
    n.vx -= n.x * gravity;
    n.vy -= n.y * gravity;
  });

  // 排斥力
  for (let i = 0; i < count; i++) {
    for (let j = i + 1; j < count; j++) {
      const a = simNodes[i], b = simNodes[j];
      const dx = b.x - a.x, dy = b.y - a.y;
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;
      const minDist = a.r + b.r + 30;
      const f = repel / (dist * dist);
      const fx = f * dx / dist, fy = f * dy / dist;
      a.vx -= fx; a.vy -= fy;
      b.vx += fx; b.vy += fy;
      // 碰撞
      if (dist < minDist) {
        const push = (minDist - dist) * 0.2;
        a.vx -= push * dx / dist; a.vy -= push * dy / dist;
        b.vx += push * dx / dist; b.vy += push * dy / dist;
      }
    }
  }

  // 彈簧力
  const nodeMap = {}; simNodes.forEach(n => { nodeMap[n.id] = n; });
  visibleEdges.forEach(e => {
    const a = nodeMap[e.source], b = nodeMap[e.target];
    if (!a || !b) return;
    const dx = b.x - a.x, dy = b.y - a.y;
    const dist = Math.sqrt(dx * dx + dy * dy) || 1;
    const ideal = (e.type === 'sibling' ? 60 : e.type === 'semantic' ? 150 : 120) * sf;
    const s = e.type === 'sibling' ? k * 0.1 : k;
    const f = (dist - ideal) * s;
    a.vx += f * dx / dist; a.vy += f * dy / dist;
    b.vx -= f * dx / dist; b.vy -= f * dy / dist;
  });

  // 更新位置（限速）
  simNodes.forEach(n => {
    if (n === dragNode) return;
    n.vx *= damp; n.vy *= damp;
    const speed = Math.sqrt(n.vx * n.vx + n.vy * n.vy);
    if (speed > maxSpeed) { n.vx *= maxSpeed / speed; n.vy *= maxSpeed / speed; }
    n.x += n.vx; n.y += n.vy;
  });
}

// ====== 繪製 ======
function getThemeColors() {
  const light = currentTheme === 'light';
  return {
    bg: light ? '#f5f5f7' : '#1a1a2e',
    edgeActive: light ? 'rgba(91,99,224,0.7)' : 'rgba(124,131,253,0.7)',
    edgeSemantic: light ? 'rgba(124,107,196,0.35)' : 'rgba(167,139,250,0.25)',
    edgeContains: light ? 'rgba(0,0,0,0.15)' : 'rgba(255,255,255,0.1)',
    edgeOther: light ? 'rgba(0,0,0,0.08)' : 'rgba(255,255,255,0.05)',
    labelHi: light ? '#111' : '#fff',
    labelMid: light ? '#333' : '#ddd',
    labelLow: light ? 'rgba(0,0,0,0.5)' : 'rgba(255,255,255,0.55)',
  };
}

function draw() {
  requestAnimationFrame(draw);
  try {
    const tc = getThemeColors();
    canvas.style.background = tc.bg;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(panX, panY);
    ctx.scale(zoom, zoom);
    const nodeMap = {};
    simNodes.forEach(n => { nodeMap[n.id] = n; });

    // 心智圖/樹狀圖：畫分支線
    if (currentLayout === 'mindmap' || currentLayout === 'tree') {
      drawStructuredEdges(ctx, tc);
    }

    // 邊（密集時只顯示 hover/選中節點的連線）
    const dense = simNodes.length > 30;
    const focusId = selectedNode?.id || hoveredNode?.id;
    if (currentLayout === 'mindmap' || currentLayout === 'tree') {
      // 結構化佈局不畫原始邊
    } else visibleEdges.forEach(e => {
      const a = nodeMap[e.source], b = nodeMap[e.target];
      if (!a || !b) return;
      const isActive = focusId && (focusId === a.id || focusId === b.id);

      // 密集模式：沒有 focus 時只畫很淡的線，有 focus 時只畫相關的
      if (dense && !isActive) {
        if (focusId) return; // 有焦點時隱藏無關的線
        ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
        ctx.strokeStyle = tc.edgeSemantic; ctx.lineWidth = 0.5;
        ctx.stroke();
        return;
      }

      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      if (isActive) { ctx.strokeStyle = tc.edgeActive; ctx.lineWidth = 2.5; }
      else if (e.type === 'semantic' || e.type === 'keyword') { ctx.strokeStyle = tc.edgeSemantic; ctx.lineWidth = 1; }
      else if (e.type === 'contains') { ctx.strokeStyle = tc.edgeContains; ctx.lineWidth = 0.6; }
      else { ctx.strokeStyle = tc.edgeOther; ctx.lineWidth = 0.4; }
      ctx.stroke();
    });

    // 節點
    simNodes.forEach(n => {
      const isSel = selectedNode && selectedNode.id === n.id;
      const isNb = selectedNode && isConnected(selectedNode.id, n.id);
      const isHov = hoveredNode && hoveredNode.id === n.id;

      // 光暈
      if (isSel) {
        const grad = ctx.createRadialGradient(n.x, n.y, n.r, n.x, n.y, n.r * 3);
        grad.addColorStop(0, n.displayColor + '44');
        grad.addColorStop(1, 'transparent');
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.r * 3, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();
      }

      // 形狀
      ctx.beginPath();
      if (n.type === 'folder') {
        roundRect(ctx, n.x - n.r, n.y - n.r, n.r * 2, n.r * 2, 6);
      } else if (n.type === 'keyword') {
        ctx.moveTo(n.x, n.y - n.r);
        ctx.lineTo(n.x + n.r, n.y);
        ctx.lineTo(n.x, n.y + n.r);
        ctx.lineTo(n.x - n.r, n.y);
        ctx.closePath();
      } else {
        ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
      }

      const dense = simNodes.length > 30;
      const alpha = isSel ? 'ff' : isNb ? 'dd' : isHov ? 'ee' : selectedNode ? '22' : dense ? '77' : '99';
      ctx.fillStyle = (n.displayColor || '#6b7280') + alpha;
      ctx.fill();
      if (isSel || isNb || isHov) {
        ctx.strokeStyle = n.displayColor || '#6b7280';
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      // 標籤
      {
        const dense = simNodes.length > 30;
        let show;
        const few = simNodes.length <= 10;
        if (labelMode === 2) {
          show = false;
        } else if (labelMode === 1) {
          show = true;
        } else if (few) {
          show = true;
        } else {
          // 自動：只顯示 hover、選中、鄰居
          show = isSel || isNb || isHov;
        }
        if (show) {
          const fs = Math.max(10, Math.min(14, n.r * 0.85)) * labelScale;
          ctx.font = fs + 'px Segoe UI,sans-serif';
          ctx.textAlign = 'center';
          ctx.fillStyle = isSel ? tc.labelHi : (isNb || isHov) ? tc.labelMid : tc.labelLow;
          const lineMax = zoom > 1 ? 16 : 10;
          const text = n.stem || n.label;
          if (text.length <= lineMax) {
            ctx.fillText(text, n.x, n.y + n.r + 14);
          } else if (text.length <= lineMax * 2) {
            ctx.fillText(text.slice(0, lineMax), n.x, n.y + n.r + 14);
            ctx.fillText(text.slice(lineMax), n.x, n.y + n.r + 14 + fs + 2);
          } else {
            ctx.fillText(text.slice(0, lineMax), n.x, n.y + n.r + 14);
            ctx.fillText(text.slice(lineMax, lineMax * 2 - 2) + '...', n.x, n.y + n.r + 14 + fs + 2);
          }
        }
      }
    });

    ctx.restore();
    applyForces();
  } catch (err) {
    // 在 canvas 上顯示錯誤
    ctx.restore();
    ctx.fillStyle = '#ff0000';
    ctx.font = '14px monospace';
    ctx.fillText('ERROR: ' + err.message, 20, 80);
    console.error('[draw error]', err);
  }
}

function roundRect(ctx,x,y,w,h,r) {
  ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

function isConnected(a,b) { return visibleEdges.some(e=>(e.source===a&&e.target===b)||(e.source===b&&e.target===a)); }

// ====== 互動 ======
function getMousePos(e) { return {x:(e.clientX-panX)/zoom, y:(e.clientY-panY)/zoom}; }
function hitTest(mx,my) { for(let i=simNodes.length-1;i>=0;i--){const n=simNodes[i];if(Math.hypot(n.x-mx,n.y-my)<n.r+6)return n;} return null; }

canvas.addEventListener('mousedown', e => {
  const mp=getMousePos(e); dragNode=hitTest(mp.x,mp.y);
  mouseDownPos={x:e.clientX,y:e.clientY};
  if(!dragNode){isDragging=false;lastMouse={x:e.clientX,y:e.clientY};}
});

canvas.addEventListener('mousemove', e => {
  if(dragNode){const mp=getMousePos(e);dragNode.x=mp.x;dragNode.y=mp.y;dragNode.vx=0;dragNode.vy=0;}
  else if(lastMouse){const dx=e.clientX-mouseDownPos.x,dy=e.clientY-mouseDownPos.y;if(Math.sqrt(dx*dx+dy*dy)>4)isDragging=true;if(isDragging){panX+=e.clientX-lastMouse.x;panY+=e.clientY-lastMouse.y;lastMouse={x:e.clientX,y:e.clientY};}}
  const mp=getMousePos(e); const hovered=hitTest(mp.x,mp.y); hoveredNode=hovered;
  const tt=document.getElementById('tooltip');
  if(hovered){tt.style.display='block';tt.style.left=e.clientX+14+'px';tt.style.top=e.clientY-10+'px';
    let text=hovered.label;if(hovered.size)text+=` (${hovered.size||hovered.sizeFormatted})`;if(hovered.fileCount)text+=` (${hovered.fileCount} 個檔案)`;
    tt.textContent=text;canvas.style.cursor='pointer';
  } else {tt.style.display='none';canvas.style.cursor=isDragging?'grabbing':'grab';}
});

canvas.addEventListener('mouseup', e => {
  if(!isDragging&&mouseDownPos){const mp=getMousePos(e);const c=hitTest(mp.x,mp.y);if(c){selectedNode=c;openSidebar(c);}else{selectedNode=null;closeSidebar();}}
  isDragging=false;dragNode=null;lastMouse=null;mouseDownPos=null;
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();const f=e.deltaY>0?0.92:1.08;const nz=Math.max(0.15,Math.min(4,zoom*f));
  panX=e.clientX-(e.clientX-panX)*nz/zoom;panY=e.clientY-(e.clientY-panY)*nz/zoom;zoom=nz;
}, {passive:false});

// ====== 側邊欄 ======
function openSidebar(node) {
  document.getElementById('sb-title').textContent = node.label;

  let meta = '';
  if (node.type==='file') {
    meta += `類型：<span>${node.category}</span> (${node.ext||''})<br>`;
    if(node.size) meta += `大小：<span>${node.size}</span><br>`;
    if(node.modifiedDate) meta += `修改日期：<span>${node.modifiedDate}</span>`;
  } else if (node.type==='folder') {
    meta += `類型：<span>資料夾</span><br>包含：<span>${node.fileCount} 個檔案</span>`;
  }
  document.getElementById('sb-meta').innerHTML = meta;

  const tags = node.tags&&node.tags.length>0?node.tags:[node.category,node.ext,node.modifiedDate].filter(Boolean);
  document.getElementById('sb-tags').innerHTML = tags.map(t=>`<span class="tag">${t}</span>`).join('');

  const ss=document.getElementById('sb-summary-section'), sd=document.getElementById('sb-summary');
  if(node.summary&&!node.summary.startsWith('（')){ss.style.display='block';sd.textContent=node.summary;}else{ss.style.display='none';}

  const ks=document.getElementById('sb-keywords-section'), kd=document.getElementById('sb-keywords');
  if(node.keywords&&node.keywords.length>0){ks.style.display='block';kd.innerHTML=node.keywords.map(k=>`<span class="kw">${k}</span>`).join('');}else{ks.style.display='none';}

  // 按鈕
  const btn=document.getElementById('open-file-btn');
  const srcBtn=document.getElementById('open-source-btn');
  if(node.type==='file'){
    btn.style.display='block';
    btn.setAttribute('data-path',node.path);btn.setAttribute('data-ext',node.ext||'');btn.setAttribute('data-wiki',node.wikiFile||'');
    const isRemote = location.hostname !== 'localhost' && location.hostname !== '127.0.0.1';
    const openLabel = isRemote ? '⬇ 下載原始檔案' : '📄 開啟原始檔案';
    if(node.wikiFile){
      btn.textContent='📝 閱讀 Wiki 筆記';
      srcBtn.style.display='block'; srcBtn.setAttribute('data-path',node.path);
      srcBtn.textContent = isRemote ? '⬇ 下載原始檔案' : '📂 開啟原始檔案';
    } else {
      btn.textContent=(node.ext==='.md'?'📝 閱讀內容':openLabel);
      srcBtn.style.display='none';
    }
  } else { btn.style.display='none'; srcBtn.style.display='none'; }

  // 子項目
  const ct=document.getElementById('sb-children-title'),cd=document.getElementById('sb-children');
  if(node.type==='folder'&&node.children&&node.children.length>0){
    ct.style.display='block';
    cd.innerHTML=node.children.map(cid=>{const c=simNodes.find(n=>n.id===cid);return c?`<a onclick="selectNodeById('${cid}')">${c.type==='folder'?'📁':'📄'} ${c.label}</a>`:''}).join('');
  } else { ct.style.display='none'; cd.innerHTML=''; }

  // 相鄰
  const nbs=new Set();
  visibleEdges.forEach(e=>{if(e.source===node.id)nbs.add(e.target);if(e.target===node.id)nbs.add(e.source);});
  nbs.delete(node.id);
  document.getElementById('sb-neighbors').innerHTML=[...nbs].map(id=>{const n=simNodes.find(x=>x.id===id);return n?`<a onclick="selectNodeById('${id}')">${n.type==='folder'?'📁':'📄'} ${n.label}</a>`:''}).join('')||'<span style="color:#444;font-size:13px">無</span>';

  document.getElementById('sidebar').classList.add('open');
}

function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); selectedNode=null; }
function selectNodeById(id) { const n=simNodes.find(x=>x.id===id);if(n){selectedNode=n;openSidebar(n);panX=canvas.width/2-n.x*zoom;panY=canvas.height/2-n.y*zoom;} }

function openFile() {
  const btn=document.getElementById('open-file-btn');
  const path=btn.getAttribute('data-path'),ext=btn.getAttribute('data-ext'),wiki=btn.getAttribute('data-wiki');
  if(!path)return;
  if(wiki||ext==='.md'){
    const projectName = encodeURIComponent(graphData?.meta?.rootName || '');
    const url=wiki?'/wiki/'+projectName+'/'+wiki:'/api/read?path='+encodeURIComponent(path);
    fetch(url).then(r=>{if(!r.ok)throw new Error('無法讀取');return r.text();})
    .then(text=>{
      // 移除 YAML frontmatter
      text = text.replace(/^---\n[\s\S]*?\n---\n*/, '');
      // 移除開頭的 # 標題（側邊欄已顯示）
      text = text.replace(/^#\s+.+\n+/, '');
      // 移除開頭的 metadata 表格（| 欄位 | 值 | ... ）
      text = text.replace(/^\|[^\n]*\n\|[-|\s]*\n(\|[^\n]*\n)*/m, '');
      document.getElementById('md-content').innerHTML=marked.parse(text.trim());
      document.getElementById('md-viewer').classList.add('open');
    })
    .catch(err=>alert('無法讀取：'+err.message));
    return;
  }
  openFilePath(path);
}

function openSource() {
  const path=document.getElementById('open-source-btn').getAttribute('data-path');
  if(path) openFilePath(path);
}

function openFilePath(path) {
  const isRemote = location.hostname !== 'localhost' && location.hostname !== '127.0.0.1';
  if (isRemote) {
    // 遠端：下載檔案
    location.href = '/api/download?path=' + encodeURIComponent(path);
    return;
  }
  fetch('/api/open?path='+encodeURIComponent(path))
  .then(r=>r.json()).then(d=>{if(d.error)alert('無法開啟：'+d.error);})
  .catch(err=>alert('連線失敗：'+err.message));
}

function closeMd() { document.getElementById('md-viewer').classList.remove('open'); }

function toggleSettings() {

function loadProjects() {
  fetch('/api/projects').then(r => r.json()).then(data => {
    const list = document.getElementById('project-list');
    if (!data.projects || data.projects.length === 0) {
      list.innerHTML = '<div style="color:var(--text-muted);font-size:13px;padding:8px">尚未建立任何專案</div>';
      return;
    }
    list.innerHTML = data.projects.map(p => {
      const isActive = p.name === data.current;
      return `<div class="dir-item${isActive ? ' active' : ''}" onclick="switchProject('${p.name.replace(/'/g, "\\'")}')">
        <div>
          <div class="dir-name">${isActive ? '● ' : ''}${p.name}</div>
          <div class="dir-meta">${p.files} 個 Wiki 頁面${p.hasGraph ? '' : ' (無圖譜)'}</div>
        </div>
      </div>`;
    }).join('');
  }).catch(() => {});

function switchProject(name) {
  fetch('/api/switch-project', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ project: name }),
  }).then(r => {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  }).then(data => {
    if (data.ok) {
      window.location.href = window.location.pathname + '?t=' + Date.now();
    } else { alert(data.error); }
  }).catch(err => alert('切換失敗：' + err.message));
}

// ====== 目錄瀏覽器 ======
let selectedBrowseDir = '';

function browseDir(path) {
  fetch('/api/browse?path=' + encodeURIComponent(path || ''))
  .then(r => r.json())
  .then(data => {
    if (data.error) { alert(data.error); return; }
    document.getElementById('browser-path').textContent = data.current;
    selectedBrowseDir = data.current;
    document.getElementById('selected-dir-info').style.display = 'block';
    document.getElementById('selected-dir-info').textContent = '已選擇：' + data.current;

    let html = '';
    if (data.parent) {
      html += `<div class="browser-item browser-up" onclick="browseDir('${data.parent.replace(/'/g, "\\'")}')">
        <span class="icon">⬆</span><span class="name">上一層</span></div>`;
    }
    data.items.forEach(item => {
      const count = item.count >= 0 ? item.count + ' 項' : '';
      html += `<div class="browser-item" ondblclick="browseDir('${item.path.replace(/'/g, "\\'")}')" onclick="selectBrowseDir(this, '${item.path.replace(/'/g, "\\'")}')">
        <span class="icon">📁</span><span class="name">${item.name}</span><span class="meta">${count}</span></div>`;
    });
    if (data.items.length === 0) {
      html += '<div style="padding:12px;color:var(--text-muted);font-size:13px;text-align:center">沒有子資料夾</div>';
    }
    document.getElementById('browser-list').innerHTML = html;
  }).catch(err => alert('瀏覽失敗：' + err.message));
}

function selectBrowseDir(el, path) {
  document.querySelectorAll('.browser-item.selected').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  selectedBrowseDir = path;
  document.getElementById('selected-dir-info').style.display = 'block';
  document.getElementById('selected-dir-info').textContent = '已選擇：' + path;
}

function loadBuildModels() {
  fetch('/api/models').then(r => r.json()).then(data => {
    const sel = document.getElementById('build-model-select');
    sel.innerHTML = '';
    data.models.forEach(m => {
      if (!m.available) return;
      const opt = document.createElement('option');
      opt.value = m.id;
      opt.textContent = m.name;
      sel.appendChild(opt);
    });
  }).catch(() => {});
}

function scanDirectory(useLlm) {
  const dir = selectedBrowseDir;
  if (!dir) { alert('請先選擇一個資料夾'); return; }

  const status = document.getElementById('scan-status');
  const llmBtn = document.getElementById('scan-llm-btn');
  const fastBtn = document.getElementById('scan-fast-btn');
  status.style.display = 'block';
  status.textContent = useLlm ? '🤖 AI 分析中，請稍候（可能需要幾分鐘）...' : '📁 掃描中...';
  llmBtn.disabled = true; fastBtn.disabled = true;

  fetch('/api/scan', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ directory: dir, useLlm, model: document.getElementById('build-model-select').value }),
  }).then(r => r.json()).then(data => {
    llmBtn.disabled = false; fastBtn.disabled = false;
    if (data.ok) {
      status.innerHTML = `✅ 完成！專案「${data.project}」已建立。<br><button class="btn-primary" style="margin-top:8px;padding:8px 16px" onclick="location.reload()">重新載入圖譜</button>`;
    } else {
      status.textContent = '❌ ' + data.error;
    }
  }).catch(err => {
    llmBtn.disabled = false; fastBtn.disabled = false;
    status.textContent = '❌ ' + err.message;
  });
}

// ====== 左右面板拖曳調整大小 ======
function setupPanelResize(handleId, panelId, side) {
  const handle = document.getElementById(handleId);
  const panel = document.getElementById(panelId);
  if (!handle || !panel) return;
  let dragging = false, startX, startW;

  handle.addEventListener('mousedown', e => {
    e.preventDefault(); dragging = true; startX = e.clientX; startW = panel.offsetWidth;
    handle.classList.add('dragging');
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });

  function onMove(e) {
    if (!dragging) return;
    const dx = e.clientX - startX;
    const newW = Math.max(120, Math.min(500, side === 'left' ? startW + dx : startW - dx));
    panel.style.width = newW + 'px';
    if (side === 'left') {
      const bar = document.getElementById('spacing-bar');
      if (bar) bar.style.left = newW + 'px';
    }
  }

  function onUp() {
    dragging = false; handle.classList.remove('dragging');
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  }
}

document.addEventListener('DOMContentLoaded', () => {
  setupPanelResize('left-resize', 'left-panel', 'left');
  setupPanelResize('right-resize', 'sidebar', 'right');
});

// ====== 關鍵字清單 ======
let allKeywords = []; // {name, count, id}

function buildKeywordList() {
  if (!graphData) return;
  const kwMap = {};
  graphData.nodes.forEach(n => {
    if (n.keywords && n.keywords.length > 0) {
      n.keywords.forEach(kw => { kwMap[kw] = (kwMap[kw] || 0) + 1; });
    }
  });
  allKeywords = Object.entries(kwMap)
    .filter(([_, c]) => c >= 2)
    .sort((a, b) => b[1] - a[1])
    .map(([name, count]) => ({ name, count, id: 'kw_' + name }));
  renderKeywordList('');
}

function renderKeywordList(filter) {
  const list = document.getElementById('keyword-list');
  const items = filter
    ? allKeywords.filter(k => k.name.toLowerCase().includes(filter.toLowerCase()))
    : allKeywords;

  list.innerHTML = items.map(k =>
    `<div class="kw-item" onclick="selectKeyword('${k.name.replace(/'/g, "\\'")}')" data-kw="${k.name}">
      <span>${k.name}</span><span class="kw-count">${k.count}</span>
    </div>`
  ).join('') || '<div style="padding:8px;color:var(--text-muted);font-size:12px">無符合的關鍵字</div>';
}

function filterKeywordList(val) { renderKeywordList(val); }

let activeKeywordFilter = null;

function selectKeyword(name) {
  // 切到關鍵字維度
  if (currentDimension !== 'keyword') switchDimension('keyword');

  // 高亮按鈕
  const wasActive = activeKeywordFilter === name;
  document.querySelectorAll('.kw-item').forEach(el => {
    el.classList.toggle('active', !wasActive && el.dataset.kw === name);
  });

  // 切換篩選：再次點擊同一個關鍵字則取消篩選
  activeKeywordFilter = wasActive ? null : name;
  buildVisualization();

  // 找到關鍵字節點並選中
  const kwNode = simNodes.find(n => n.id === 'kw_' + name || n.label === name);
  if (kwNode) {
    selectedNode = kwNode;
    openSidebar(kwNode);
    panX = canvas.width / 2 - kwNode.x * zoom;
    panY = canvas.height / 2 - kwNode.y * zoom;
  }
}

function updateSpacing(val) {
  spacingFactor = val / 100;
  document.getElementById('spacing-val').textContent = val + '%';
}

function updateFontSize(val) {
  labelScale = val / 100;
  document.getElementById('fontsize-val').textContent = val + '%';
}

function toggleNoContent() {
  hideNoContent = !hideNoContent;
  document.getElementById('filter-docs-btn').classList.toggle('active', hideNoContent);
  document.getElementById('filter-all-btn').classList.toggle('active', !hideNoContent);

// ====== 查詢面板 ======
let chatDock = 'bottom'; // 'bottom' or 'right'
let isComposing = false; // 中文輸入法狀態

// 中文輸入法 Enter 問題修復
document.addEventListener('DOMContentLoaded', () => {

    panel.classList.add('dock-right');
    panel.style.height = ''; panel.style.width = '480px';

function clearChat() { document.getElementById('chat-messages').innerHTML = ''; }

// 拖曳調整大小
(function() {
  const resize = document.getElementById('chat-resize');
  const panel = document.getElementById('chat-panel');
  let startY, startX, startH, startW, dragging = false;

  resize.addEventListener('mousedown', e => {
    e.preventDefault(); dragging = true;
    startY = e.clientY; startX = e.clientX;
    startH = panel.offsetHeight; startW = panel.offsetWidth;
    resize.classList.add('dragging');
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });

  function onMove(e) {
    if (!dragging) return;
    if (chatDock === 'bottom') {
      const newH = Math.max(200, Math.min(window.innerHeight - 100, startH - (e.clientY - startY)));
      panel.style.height = newH + 'px';
    } else {
      const newW = Math.max(320, Math.min(window.innerWidth - 200, startW - (e.clientX - startX)));
      panel.style.width = newW + 'px';
    }
  }

  function onUp() {
    dragging = false;
    resize.classList.remove('dragging');
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  }
})();

// 模型管理
function loadModels() {
  fetch('/api/models').then(r => r.json()).then(data => {
    const sel = document.getElementById('model-select');
    sel.innerHTML = '';
    data.models.forEach(m => {
      if (!m.available) return;
      const opt = document.createElement('option');
      opt.value = m.id;
      opt.textContent = m.name;
      if (m.id === data.current) opt.selected = true;
      sel.appendChild(opt);
    });
  }).catch(() => {});
}

function setModel(modelId) {
  fetch('/api/set-model', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ model: modelId }),
  }).then(r => r.json()).then(data => {
    if (data.ok) {
      const msgs = document.getElementById('chat-messages');
      msgs.innerHTML += `<div class="msg-model">🔄 已切換至 ${data.current}</div>`;
    }
  }).catch(() => {});
}

function sendQuery() {
  const input = document.getElementById('chat-input'), q = input.value.trim();
  if (!q) return;
  const msgs = document.getElementById('chat-messages'), btn = document.getElementById('chat-send-btn');
  const modelName = document.getElementById('model-select').selectedOptions[0]?.textContent || '';
  msgs.innerHTML += `<div class="msg-user">${escapeHtml(q)}</div><div class="msg-loading" id="loading-msg">${escapeHtml(modelName)} 思考中 <span class="dot-pulse"><span></span><span></span><span></span></span></div>`;
  msgs.scrollTop = msgs.scrollHeight; input.value = ''; btn.disabled = true;

  fetch('/api/query', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({question: q}) })
  .then(r => r.json()).then(data => {
    const lm = document.getElementById('loading-msg'); if (lm) lm.remove();
    if (data.error) {
      msgs.innerHTML += `<div class="msg-bot" style="color:#f87171">❌ ${escapeHtml(data.error)}</div>`;
    } else {
      let answer = data.answer;
      answer = answer.replace(/\[\[([^\]]+)\]\]/g, (_, name) => `[${name}](#node:${name})`);
      let html = marked.parse(answer);
      html = html.replace(/href="#node:([^"]+)"/g, (_, name) =>
        `href="javascript:void(0)" onclick="findAndSelectNode('${name.replace(/'/g, "\\'")}')" style="color:#3b82f6"`);
      msgs.innerHTML += `<div class="msg-bot">${html}</div>`;
      if (data.model) msgs.innerHTML += `<div class="msg-model">— ${data.model}</div>`;
    }
    msgs.scrollTop = msgs.scrollHeight; btn.disabled = false;
  }).catch(err => {
    const lm = document.getElementById('loading-msg'); if (lm) lm.remove();
    msgs.innerHTML += `<div class="msg-bot" style="color:#f87171">❌ ${escapeHtml(err.message)}</div>`;
    msgs.scrollTop = msgs.scrollHeight; btn.disabled = false;
  });
}

function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
function findAndSelectNode(name) {
  const n = simNodes.find(x => x.label===name||x.stem===name||x.label.includes(name)||(x.stem&&x.stem.includes(name)));
  if (n) { selectedNode=n; openSidebar(n); panX=canvas.width/2-n.x*zoom; panY=canvas.height/2-n.y*zoom; }
}

loadData();
